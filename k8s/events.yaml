apiVersion: apps/v1
kind: Deployment
metadata:
  name: events
spec:
  replicas: 1
  selector:
    matchLabels:
      app: events
  template:
    metadata:
      labels:
        app: events
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: events
          image: ghcr.io/stefan-genie/quickticket-events:a46908e9b8f21b2792647220d5ee1296f9d18b74
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: quickticket
            - name: DB_USER
              value: quickticket
            - name: DB_PASS
              value: quickticket
            - name: DB_MAX_CONNS
              value: "10"
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_TIMEOUT_MS
              value: "1000"
            - name: RESERVATION_TTL
              value: "300"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            periodSeconds: 5
            failureThreshold: 2
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: events
spec:
  type: ClusterIP
  selector:
    app: events
  ports:
    - port: 8081
      targetPort: 8081
