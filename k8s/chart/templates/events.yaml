apiVersion: apps/v1
kind: Deployment
metadata:
  name: events
spec:
  replicas: {{ .Values.events.replicas }}
  selector:
    matchLabels:
      app: events
  template:
    metadata:
      labels:
        app: events
    spec:
      containers:
        - name: events
          image: {{ .Values.events.image }}
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: DB_HOST
              value: {{ .Values.events.db.host | quote }}
            - name: DB_PORT
              value: {{ .Values.events.db.port | quote }}
            - name: DB_NAME
              value: {{ .Values.events.db.name | quote }}
            - name: DB_USER
              value: {{ .Values.events.db.user | quote }}
            - name: DB_PASS
              value: {{ .Values.events.db.password | quote }}
            - name: DB_MAX_CONNS
              value: {{ .Values.events.maxConns | quote }}
            - name: REDIS_HOST
              value: {{ .Values.events.redis.host | quote }}
            - name: REDIS_PORT
              value: {{ .Values.events.redis.port | quote }}
            - name: REDIS_TIMEOUT_MS
              value: {{ .Values.events.redis.timeoutMs | quote }}
            - name: RESERVATION_TTL
              value: {{ .Values.events.reservationTtl | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            periodSeconds: 5
            failureThreshold: 2
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: events
spec:
  type: ClusterIP
  selector:
    app: events
  ports:
    - port: 8081
      targetPort: 8081
